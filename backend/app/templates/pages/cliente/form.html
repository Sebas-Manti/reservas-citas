{% extends "base.html" %}
{% block title %}{{ accion }} Cliente{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ accion }} Cliente</h1>
    <a href="{{ url_for('cliente.listar') }}" class="btn btn-primary">← Volver</a>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label for="nombre">Nombre *</label>
            <input type="text" id="nombre" name="nombre"
                   value="{{ cliente.nombre if cliente else '' }}" required>
        </div>
        <div class="form-group">
            <label for="apellido">Apellido *</label>
            <input type="text" id="apellido" name="apellido"
                   value="{{ cliente.apellido if cliente else '' }}" required>
        </div>
        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email"
                   value="{{ cliente.email if cliente else '' }}" required>
        </div>
        <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" name="telefono"
                   value="{{ cliente.telefono if cliente else '' }}">
        </div>
        <button type="submit" class="btn btn-success">{{ accion }}</button>
    </form>
</div>
{% endblock %}
