{% extends "base.html" %}
{% block title %}Nueva Cita{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Nueva Cita</h1>
    <a href="{{ url_for('cita.listar') }}" class="btn btn-primary">← Volver</a>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label for="id_cliente">Cliente *</label>
            <select id="id_cliente" name="id_cliente" required>
                <option value="">— Seleccionar —</option>
                {% for c in clientes %}
                <option value="{{ c.id_cliente }}">{{ c.nombre_completo }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="id_servicio">Servicio *</label>
            <select id="id_servicio" name="id_servicio" required>
                <option value="">— Seleccionar —</option>
                {% for s in servicios %}
                <option value="{{ s.id_servicio }}">
                    {{ s.nombre }} — ${{ "{:,.0f}".format(s.precio) }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="id_slot">Slot disponible *</label>
            <select id="id_slot" name="id_slot" required>
                <option value="">— Seleccionar —</option>
                {% for sl in slots_libres %}
                <option value="{{ sl.id_slot }}">
                    {{ sl.profesional_nombre }} —
                    {{ sl.fecha_hora_inicio.strftime('%Y-%m-%d %H:%M') }}
                    a {{ sl.fecha_hora_fin.strftime('%H:%M') }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="notas">Notas</label>
            <textarea id="notas" name="notas"></textarea>
        </div>
        <button type="submit" class="btn btn-success">Reservar Cita</button>
    </form>
</div>
{% endblock %}
